name: doodiary
description: "文字を入力しない、落書き感覚のメンタルヘルス日記アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0

  # モデル
  freezed_annotation: ^3.1.0

  # ルーティング
  go_router: ^17.3.0

  # バックエンド
  supabase_flutter: ^2.14.1

  # ローカルDB（Isarはbuild_runner/freezedと非互換のためDriftを採用）
  drift: ^2.22.0
  drift_flutter: ^0.2.8

  # UUID生成（saveLocally でクライアント側に id を付与し Supabase 重複 INSERT を防ぐ）
  uuid: ^4.5.1

  # チャート
  fl_chart: ^1.2.0

  # アニメーション
  flutter_animate: ^4.5.2

  # 環境変数は --dart-define で注入し String.fromEnvironment で読む（パッケージ不要）

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # コード生成
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0
  freezed: ^3.2.5
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true
